{% extends 'side_bar_member.html' %}
{% load static %}
{% block content %}
<div
  class="bg-white items-center flex p-10 justify-between border-b border-gray-200 h-[80px]"
>
  <div><h1 class="text-[40px] font-bold">{{ task.task_name }}</h1></div>
  <div class="flex flex-row gap-1">
      <div><a href="{% url 'task' project.project_id %}" class="border border-gray-200 bg-black rounded-md p-2 text-white transition duration delay-300 hover:bg-black hover:scale-105">Cancel</a></div>
  </div>
</div>

<div class="border border-gray-300 w-full h-[calc(100vh-200px)] mr-5 mt-10 rounded-2xl p-5 overflow-y-scroll">

<form action="" method="post">
    {% csrf_token %}
    <h3 class="font-bold">Are you sure you want to delete?</h3>
    <a href="{{request.META.HTTP_REFERER}}" class="border border-gray-300 bg-black text-white p-1 rounded-xl">Go back</a>
    <input type="submit" value="Confirm" class="border border-gray-300 bg-black text-white p-[2px] rounded-xl">
</form>
</div>
{% endblock %}
