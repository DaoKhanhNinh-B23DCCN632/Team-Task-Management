{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="border border-gray-200 grid grid-cols-[220px_1fr] grid-rows-[80px_1fr] min-h-screen">
        <div class="flex flex-col bg-white border-r border-gray-200 pt-[20px] items-center row-span-2">
        <!-- dashboard side bar -->
            <div class="w-40 space-y-6">
                <button class="flex items-center border border-gray-300 rounded-xl bg-gray-100 p-2 w-full transition delay-150 duration-300 ease-in-out    hover:bg-gray-200 hover:scale-105">
                    <img src="{% static 'icons/dashboard.png' %}" alt="dashboard icon" class="w-5 h-5 mr-2"> 
                    <a href="{% url 'dashboard' %}">Dashboard</a>
                </button>
                
                <!-- projile -->
                <button class="flex items-center border border-gray-300 rounded-xl bg-gray-100 p-2 w-full transition delay-150 duration-300 ease-in-out    hover:bg-gray-200 hover:scale-105">
                    <img src="{% static 'icons/profile.png' %}" alt="profile icon" class="w-5 h-5 mr-2">
                    <a href="{% url 'member' %}">Member</a>
                </button>
                
                <!-- project -->
                <button class="flex items-center border border-gray-300 rounded-xl bg-gray-100 p-2 w-full transition delay-150 duration-300 ease-in-out    hover:bg-gray-200 hover:scale-105">
                    <img src="{% static 'icons/project.png' %}" alt="project icon" class="w-5 h-5 mr-2">
                    <a href="{% url 'project' %}">Project</a>
                </button>
                
                <!-- calendar -->
                <button class="flex items-center border border-gray-300 rounded-xl bg-gray-100 p-2 w-full transition delay-150 duration-300 ease-in-out    hover:bg-gray-200 hover:scale-105">
                    <img src="{% static 'icons/logout.png' %}" alt="project icon" class="w-5 h-5 mr-2">
                    <a href="{% url 'login' %}">Log out</a>
                </button>
            </div>
        </div>
        <div class="p-6">
             {% block content %}
             {% endblock %}
        </div>
    </div>
</body>
</html>
